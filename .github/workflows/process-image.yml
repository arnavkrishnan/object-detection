name: Process Image

on:
  repository_dispatch:
    types: [process-image]

jobs:
  process_image:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tensorflow pillow numpy opencv-python-headless

    - name: Run YOLO object detection
      run: |
        echo "${{ github.event.client_payload.image }}" | base64 --decode > input_image.jpg
        python process_image.py input_image.jpg processed_image.jpg

    - name: Commit and push the result
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        mv processed_image.jpg path/to/processed_image.jpg
        git add path/to/processed_image.jpg
        git commit -m "Processed image"
        git push
